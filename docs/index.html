<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Indicator Tracker — Official Data vs. Prediction Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="ticker" id="ticker">
  <div class="ticker-inner" id="tickerInner">
    <!-- populated by app.js -->
  </div>
</header>

<main>
  <div class="masthead">
    <h1>Indicator Tracker</h1>
    <p class="subhead">Official releases, set against what Kalshi's contracts already expect.</p>
    <p class="updated" id="lastUpdated">—</p>
  </div>

  <section class="cards" id="cards">
    <!-- indicator cards injected by app.js -->
  </section>

  <footer>
    <p>Official data: Federal Reserve Economic Data (FRED). Market data: Kalshi. Contract prices reflect risk-neutral implied probabilities, not confirmed outcomes.</p>
  </footer>
</main>

<template id="card-template">
  <article class="card">
    <div class="card-head">
      <h2 class="card-title"></h2>
      <div class="card-official">
        <span class="official-value"></span>
        <span class="official-date"></span>
      </div>
    </div>

    <div class="card-body">
      <div class="chart-block">
        <p class="chart-label">Official trend, last 11 months</p>
        <canvas class="official-chart"></canvas>
      </div>

      <div class="chart-block">
        <p class="chart-label">Market-implied distribution, next release</p>
        <canvas class="market-chart"></canvas>
      </div>
    </div>

    <div class="spread">
      <div class="spread-item">
        <span class="spread-label">Market expected value</span>
        <span class="spread-value expected"></span>
      </div>
      <div class="spread-item">
        <span class="spread-label">Last official reading</span>
        <span class="spread-value last-official"></span>
      </div>
      <div class="spread-item">
        <span class="spread-label">Spread</span>
        <span class="spread-value delta"></span>
      </div>
    </div>
  </article>
</template>

<script src="app.js"></script>
</body>
</html>
